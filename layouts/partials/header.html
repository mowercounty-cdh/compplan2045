<header class="site-header">
  <div class="container header-inner">
    <a class="brand" href="{{ "/" | relURL }}">
      <img src="{{ .Site.Params.logo | strings.TrimPrefix "/" | relURL }}" alt="Comprehensive Plan 2045 — Mower County and City of Austin" class="brand-logo">
    </a>
    <input type="checkbox" id="nav-toggle" class="nav-toggle" aria-hidden="true">
    <label for="nav-toggle" class="nav-toggle-label" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </label>
    <nav class="site-nav" aria-label="Primary">
      <ul>
        {{ range .Site.Menus.main }}
          {{ $active := or ($.IsMenuCurrent "main" .) ($.HasMenuCurrent "main" .) }}
          <li><a href="{{ .URL }}"{{ if $active }} class="active" aria-current="page"{{ end }}>{{ .Name }}</a></li>
        {{ end }}
      </ul>
    </nav>
  </div>
</header>
